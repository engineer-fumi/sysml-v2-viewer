name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: node esbuild.mjs
      - name: Core tests (parser / validator / layout, all samples clean)
        run: npm run test:core

  vscode-integration:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node esbuild.mjs
      - name: Integration tests (VS Code extension host)
        run: xvfb-run -a npm run test:vscode
